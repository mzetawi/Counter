<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Counter</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light form">
  <div class="container py-5">
    <div class="mx-auto card shadow-sm p-4" style="max-width: 540px;">
      <h1 class="h3 text-center mb-3">Counter</h1>

      <div class="text-center mb-3">
        <p class="mb-1">Counter value: <strong>{{ counter }}</strong></p>
        <p class="text-muted mb-0">Page visits: <strong>{{ visits }}</strong></p>
      </div>

      <div class="d-grid gap-2">
        <form action="{{ url_for('increment') }}" method="post" class="d-flex gap-2">
          <input type="hidden" name="step" value="1">
          <button class="btn btn-primary w-100" type="submit">+1</button>
        </form>

        <form action="{{ url_for('plus2') }}" method="post">
          <button class="btn btn-secondary w-100" type="submit">+2</button>
        </form>

        <form action="{{ url_for('increment') }}" method="post" class="d-flex gap-2">
          <input class="form-control" type="number" name="step" placeholder="Enter step (e.g., 5)" required>
          <button class="btn btn-success" type="submit">Add</button>
        </form>

        <form action="{{ url_for('reset') }}" method="post">
          <button class="btn btn-outline-danger w-100" type="submit">Reset</button>
        </form>

        <a class="btn btn-outline-dark w-100" href="{{ url_for('destroy_session') }}">Destroy Session</a>
      </div>
    </div>
  </div>
</body>
</html>
